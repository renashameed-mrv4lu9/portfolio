  <body>
    <script>
      // Workaround for React 19 trying to patch fetch in environments where it has only a getter
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          writable: true,
          value: originalFetch
        });
      } catch (e) {
        console.error('Failed to make fetch writable:', e);
      }
    </script>
